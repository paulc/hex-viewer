<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hex Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #111a24;
  font-family: monospace;
  color: #c8d8e8;
}

#app { display: flex; flex-direction: column; width: 100%; height: 100%; }

#toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 14px;
  background: #162030;
  border-bottom: 1px solid #253545;
  flex-shrink: 0;
  flex-wrap: wrap;
  font-size: 13px;
}

.title { color: #6ab0d8; font-weight: bold; letter-spacing: .05em; white-space: nowrap; }

.sep { width: 1px; height: 18px; background: #2d4050; flex-shrink: 0; }

.group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

label { display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; white-space: nowrap; }

select {
  background: #0e1c28;
  color: #c8d8e8;
  border: 1px solid #2d4050;
  padding: 2px 6px;
  border-radius: 3px;
  font-family: monospace;
  font-size: 12px;
  cursor: pointer;
}

button {
  background: #0e1c28;
  color: #c8d8e8;
  border: 1px solid #2d4050;
  padding: 3px 10px;
  border-radius: 3px;
  cursor: pointer;
  font-family: monospace;
  font-size: 13px;
  white-space: nowrap;
}
button:hover { background: #1a2d40; border-color: #4a6a88; }

/* Colour swatch inputs */
input[type=color] {
  width: 22px; height: 22px;
  border: 1px solid #2d4050;
  border-radius: 3px;
  padding: 0;
  cursor: pointer;
  background: none;
  vertical-align: middle;
}

#rot-val {
  min-width: 3.8em;
  text-align: center;
  color: #6ab0d8;
  font-size: 13px;
}

input[type=range] {
  width: 80px;
  cursor: pointer;
  vertical-align: middle;
  accent-color: #4a8ab8;
}

.scale-val {
  min-width: 2.8em;
  display: inline-block;
  color: #6ab0d8;
  font-size: 12px;
}

#status {
  margin-left: auto;
  color: #4a6a88;
  font-size: 12px;
  white-space: nowrap;
}

#canvas-wrap { flex: 1; overflow: hidden; position: relative; }

#map-canvas {
  width: 100%;
  height: 100%;
  display: block;
  cursor: grab;
  touch-action: none;
}
#map-canvas:active { cursor: grabbing; }

#ctx-menu {
  display: none;
  position: fixed;
  z-index: 1000;
  background: rgba(10,20,30,0.96);
  border: 1px solid #4a6a88;
  border-radius: 4px;
  padding: 4px 0;
  min-width: 180px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.55);
  user-select: none;
}
.ctx-item {
  padding: 5px 14px;
  cursor: pointer;
  white-space: nowrap;
  font-size: 13px;
}
.ctx-item:hover { background: #1a3a58; }
.ctx-item.danger { color: #e07070; }
.ctx-item.danger:hover { background: #3a1818; }
.ctx-sep { height: 1px; background: #2d4050; margin: 4px 0; }
</style>
</head>
<body>
<div id="ctx-menu"></div>
<div id="app">
  <div id="toolbar">
    <span class="title">HexViewer</span>

    <div class="sep"></div>

    <!-- Layer toggles -->
    <div class="group">
      <label><input type="checkbox" id="chk-outline" checked> Outlines</label>
      <label><input type="checkbox" id="chk-label"   checked> Numbers</label>
      <label><input type="checkbox" id="chk-dot"     checked> Dots</label>
      <label><input type="checkbox" id="chk-color">          Colors</label>
      <label><input type="checkbox" id="chk-counters" checked> Counters</label>
    </div>

    <div class="sep"></div>

    <!-- Counter size sliders -->
    <div class="group">
      <label>Large <input type="range" id="sld-large" min="0.5" max="2.0" step="0.05" value="1.15">
        <span class="scale-val" id="val-large">1.15</span></label>
      <label>Small <input type="range" id="sld-small" min="0.5" max="2.0" step="0.05" value="0.85">
        <span class="scale-val" id="val-small">0.85</span></label>
    </div>

    <div class="sep"></div>

    <!-- Image layers -->
    <div class="group">
      <label><input type="checkbox" id="chk-img-tile"> Tile BG</label>
      <label><input type="checkbox" id="chk-img-fill"> Fill BG</label>
      <label><input type="checkbox" id="chk-img-anchor"> Anchor</label>
      <label>Img&nbsp;alpha
        <input type="range" id="sld-img-alpha" min="0" max="1" step="0.05" value="0.70">
        <span class="scale-val" id="val-img-alpha">0.70</span></label>
    </div>

    <div class="sep"></div>

    <!-- Colour pickers -->
    <div class="group">
      <label title="Canvas background"><input type="color" id="col-bg"     value="#f0ede0"> BG</label>
      <label title="Hex border colour"><input type="color" id="col-border" value="#556677"> Border</label>
      <label title="Hex number colour"><input type="color" id="col-number" value="#223344"> Number</label>
      <label title="Centre dot colour"><input type="color" id="col-dot"    value="#334455"> Dot</label>
    </div>

    <div class="sep"></div>

    <!-- Hex grid options -->
    <div class="group">
      <label>Orient
        <select id="sel-orient">
          <option value="pointy">Pointy-top</option>
          <option value="flat">Flat-top</option>
        </select>
      </label>
      <label>Origin
        <select id="sel-origin">
          <option value="top-left">Top-left</option>
          <option value="bottom-left">Bottom-left</option>
        </select>
      </label>
      <label>Parity
        <select id="sel-parity">
          <option value="odd">Odd</option>
          <option value="even">Even</option>
        </select>
      </label>
    </div>

    <div class="sep"></div>

    <!-- Rotation -->
    <div class="group">
      <button id="btn-ccw">↺ CCW</button>
      <span id="rot-val">0°</span>
      <button id="btn-cw">↻ CW</button>
      <label>Step
        <select id="sel-rotstep">
          <option value="45">45°</option>
          <option value="60" selected>60°</option>
          <option value="90">90°</option>
        </select>
      </label>
    </div>

    <div class="sep"></div>

    <button id="btn-fit">Fit</button>

    <span id="status">hover over a hex</span>
  </div>

  <div id="canvas-wrap">
    <canvas id="map-canvas"></canvas>
  </div>
</div>

<script src="src/hexviewer.js"></script>
<script src="src/counter-layer.js"></script>
<script src="src/image-layer.js"></script>
<script>
(function () {
  const { HexMap, Layer, Geometry, FLAT_TOP, POINTY_TOP, OFFSET_ODD, OFFSET_EVEN,
          Counter, CounterLayer, PanelLayer, ImageLayer } = window.HexViewer;

  // -- Sample custom layer: random pastel fills --------------------------------
  class ColorLayer extends Layer {
    constructor(rows, cols) {
      super('color', false);
      this._colors = Array.from({ length: rows }, () =>
        Array.from({ length: cols }, () => `hsl(${(Math.random() * 360) | 0},40%,58%)`)
      );
    }

    render(ctx, hexMap, visibleHexes) {
      const co = hexMap.cornerOffsets;
      for (const hex of visibleHexes) {
        ctx.fillStyle = this._colors[hex.row][hex.col];
        const c = Geometry.hexCorners(hex.cx, hex.cy, co);
        ctx.beginPath();
        ctx.moveTo(c[0].x, c[0].y);
        for (let i = 1; i < 6; i++) ctx.lineTo(c[i].x, c[i].y);
        ctx.closePath();
        ctx.fill();
      }
    }
  }

  const ROWS = 20, COLS = 30;
  const colorLayer   = new ColorLayer(ROWS, COLS);
  const counterLayer = new CounterLayer();

  // Overlay panel — shows hex info, stays fixed over the map
  const infoPanel = new PanelLayer('info-panel', {
    position: { top: 10, right: 10 },
    html: '<span style="color:#6ab0d8;font-weight:bold">Hex info</span><br>hover a hex',
  });
  infoPanel.setSize({ width: 160 });

  // Overlay panel — shows selected counter info; hidden until a counter is clicked
  const selPanel = new PanelLayer('sel-panel', {
    position: { bottom: 10, left: 10 },
    visible: false,
  });
  selPanel.setSize({ width: 200 });

  // Sample counters — single units, pairs, and larger stacks for warp testing
  [
    // 3-counter stack
    new Counter({ id: 'a1', row: 3,  col: 5,  size: 'large', color: '#cc4444' }),
    new Counter({ id: 'a2', row: 3,  col: 5,  size: 'large', color: '#4477cc' }),
    new Counter({ id: 'a3', row: 3,  col: 5,  size: 'small', color: '#44aa44' }),
    // 2-counter stack
    new Counter({ id: 'b1', row: 8,  col: 12, size: 'large', color: '#cc8833' }),
    new Counter({ id: 'b2', row: 8,  col: 12, size: 'small', color: '#9944cc' }),
    // lone counter
    new Counter({ id: 'c1', row: 5,  col: 20, size: 'large', color: '#229988' }),
    // 2-counter stack
    new Counter({ id: 'd1', row: 15, col: 7,  size: 'small', color: '#cc4488' }),
    new Counter({ id: 'd2', row: 15, col: 7,  size: 'large', color: '#888833' }),
    // 5-counter stack for warp testing
    new Counter({ id: 'e1', row: 10, col: 15, size: 'large', color: '#3366bb' }),
    new Counter({ id: 'e2', row: 10, col: 15, size: 'large', color: '#bb6633' }),
    new Counter({ id: 'e3', row: 10, col: 15, size: 'large', color: '#44bbbb' }),
    new Counter({ id: 'e4', row: 10, col: 15, size: 'small', color: '#bb4466' }),
    new Counter({ id: 'e5', row: 10, col: 15, size: 'small', color: '#88bb33' }),
    // 4-counter stack
    new Counter({ id: 'f1', row: 6,  col: 25, size: 'large', color: '#aa44aa' }),
    new Counter({ id: 'f2', row: 6,  col: 25, size: 'large', color: '#44aacc' }),
    new Counter({ id: 'f3', row: 6,  col: 25, size: 'small', color: '#ccaa44' }),
    new Counter({ id: 'f4', row: 6,  col: 25, size: 'small', color: '#cc6644' }),
  ].forEach(c => counterLayer.addCounter(c));

  // -- Demo image generators ---------------------------------------------------

  // Parchment tile: deterministic grain so it looks consistent every load
  function makeTileImg() {
    const el = document.createElement('canvas');
    el.width = el.height = 128;
    const c = el.getContext('2d');
    c.fillStyle = '#ddd3a8';
    c.fillRect(0, 0, 128, 128);
    c.strokeStyle = 'rgba(120,95,45,0.22)';
    c.lineWidth = 1;
    c.strokeRect(0.5, 0.5, 127, 127);
    for (let i = 0; i < 60; i++) {
      c.fillStyle = `rgba(100,75,30,${0.03 + (i % 4) * 0.01})`;
      c.beginPath();
      c.ellipse((i * 29) % 128, (i * 53) % 128, 8, 3, (i * 0.9) % Math.PI, 0, Math.PI * 2);
      c.fill();
    }
    return el;
  }

  // Gradient terrain image stretched across the full map in fill mode
  function makeMapFillImg() {
    const el = document.createElement('canvas');
    el.width = 520; el.height = 300;
    const c = el.getContext('2d');
    const g = c.createLinearGradient(0, 0, 520, 300);
    g.addColorStop(0,    '#b8c870');
    g.addColorStop(0.35, '#c8b060');
    g.addColorStop(0.65, '#4488aa');
    g.addColorStop(1,    '#336688');
    c.fillStyle = g;
    c.fillRect(0, 0, 520, 300);
    c.fillStyle = 'rgba(60,80,30,0.22)';
    c.beginPath(); c.ellipse(130, 90, 85, 55, 0.3, 0, Math.PI * 2); c.fill();
    c.fillStyle = 'rgba(160,140,80,0.18)';
    c.beginPath(); c.ellipse(360, 200, 100, 60, -0.2, 0, Math.PI * 2); c.fill();
    c.fillStyle = 'rgba(255,255,255,0.12)';
    c.font = 'italic 20px serif';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText('Map Image (fill mode)', 260, 150);
    return el;
  }

  // Anchor image: a circular map-marker icon with a compass rose, centred on a hex
  function makeAnchorImg(size) {
    const el = document.createElement('canvas');
    el.width = el.height = size;
    const c = el.getContext('2d');
    const h = size / 2;
    // Drop shadow
    c.fillStyle = 'rgba(0,0,0,0.28)';
    c.beginPath(); c.ellipse(h + 3, h + 3, h - 4, h - 4, 0, 0, Math.PI * 2); c.fill();
    // Background circle
    const bg = c.createRadialGradient(h - 4, h - 6, 2, h, h, h - 3);
    bg.addColorStop(0, '#f5eec8');
    bg.addColorStop(1, '#c8a84a');
    c.fillStyle = bg;
    c.beginPath(); c.arc(h, h, h - 3, 0, Math.PI * 2); c.fill();
    // Border
    c.strokeStyle = '#7a5a18';
    c.lineWidth = size * 0.04;
    c.stroke();
    // Compass rose: N/S/E/W points
    const pts = [[0, -1], [0, 1], [1, 0], [-1, 0]];
    const labels = ['N', 'S', 'E', 'W'];
    const r = h * 0.55;
    pts.forEach(([dx, dy], i) => {
      c.fillStyle = (i === 0) ? '#c03030' : '#3a2a08';
      c.beginPath();
      c.moveTo(h + dx * r, h + dy * r);
      c.lineTo(h + dy * r * 0.25, h - dx * r * 0.25);
      c.lineTo(h, h);
      c.lineTo(h - dy * r * 0.25, h + dx * r * 0.25);
      c.closePath(); c.fill();
      c.fillStyle = '#3a2a08';
      c.font = `bold ${size * 0.14}px serif`;
      c.textAlign = 'center'; c.textBaseline = 'middle';
      c.fillText(labels[i], h + dx * (r + size * 0.1), h + dy * (r + size * 0.1));
    });
    // Centre dot
    c.fillStyle = '#3a2a08';
    c.beginPath(); c.arc(h, h, size * 0.05, 0, Math.PI * 2); c.fill();
    return el;
  }

  // tileWidth/tileHeight in world units — 2x hexSize keeps tiles a sensible size
  const tileLayer = new ImageLayer('bg-tile', makeTileImg(), {
    mode: 'tile', tileWidth: 80, tileHeight: 80, alpha: 0.70, visible: false,
  });

  const fillLayer = new ImageLayer('map-fill', makeMapFillImg(), {
    mode: 'fill', alpha: 0.70, visible: false,
  });

  // Anchor at hex (3, 5) — same hex as the 3-counter stack, sized to fill the hex
  // width = height = hexSize * sqrt(3) ~= 69 world units
  const anchorLayer = new ImageLayer('anchor-icon', makeAnchorImg(128), {
    mode: 'anchor', row: 3, col: 5, width: 69, height: 69, alpha: 0.90, visible: false,
  });

  let map = null;

  // Build and show the selection panel; any counter click re-shows it.
  // Dismiss button hides it until the next selection event.
  function updateSelPanel(ids) {
    if (ids.size === 0) { selPanel.visible = false; return; }

    // Group selected counters by hex
    const byHex = new Map();
    for (const id of ids) {
      const c = counterLayer.getCounter(id);
      if (!c) continue;
      const key = `${c.row},${c.col}`;
      if (!byHex.has(key)) byHex.set(key, { row: c.row, col: c.col, counters: [] });
      byHex.get(key).counters.push(c);
    }

    let rows = '';
    for (const { row, col, counters } of byHex.values()) {
      rows += `<div style="color:#88aabb;font-size:11px;margin:6px 0 3px">` +
              `hex ${map.getHexLabel(row, col)}</div>`;
      for (const c of counters) {
        rows +=
          `<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">` +
          `<span style="width:12px;height:12px;background:${c.color};display:inline-block;` +
          `border:1px solid rgba(255,255,255,0.25);flex-shrink:0"></span>` +
          `<span style="flex:1;overflow:hidden;text-overflow:ellipsis">${c.id}</span>` +
          `<span style="color:#88aabb;font-size:11px">${c.size}</span>` +
          `</div>`;
      }
    }

    selPanel.html =
      `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">` +
      `<span style="color:#6ab0d8;font-weight:bold">Selected (${ids.size})</span>` +
      `<button id="sel-close" style="padding:1px 7px;font-size:12px;line-height:1.4">&#x2715;</button>` +
      `</div>` + rows;

    selPanel.panelElement.querySelector('#sel-close')
      .addEventListener('click', () => { selPanel.visible = false; });

    selPanel.visible = true;
  }

  counterLayer.onSelectionChange = updateSelPanel;

  // -- Context menu -----------------------------------------------------------

  const ctxMenu = document.getElementById('ctx-menu');
  let ctxCounter = null, ctxStack = null;

  counterLayer.onContextMenu = (counter, stack, x, y) => {
    ctxCounter = counter;
    ctxStack   = stack;

    ctxMenu.innerHTML =
      `<div class="ctx-item" data-action="rotate-ccw">&#x21BA; Rotate CCW 60°</div>` +
      `<div class="ctx-item" data-action="rotate-cw">&#x21BB; Rotate CW 60°</div>` +
      `<div class="ctx-sep"></div>` +
      `<div class="ctx-item" data-action="select-stack">Select all in stack (${stack.length})</div>` +
      `<div class="ctx-item" data-action="deselect">Deselect all</div>` +
      `<div class="ctx-sep"></div>` +
      `<div class="ctx-item danger" data-action="delete-counter">Delete ${counter.id}</div>` +
      `<div class="ctx-item danger" data-action="delete-stack">Delete stack</div>`;

    // Keep menu inside the viewport
    const mw = 190, mh = 170;
    ctxMenu.style.left    = Math.min(x, window.innerWidth  - mw) + 'px';
    ctxMenu.style.top     = Math.min(y, window.innerHeight - mh) + 'px';
    ctxMenu.style.display = 'block';
  };

  ctxMenu.addEventListener('click', e => {
    const item = e.target.closest('[data-action]');
    if (!item) return;
    ctxMenu.style.display = 'none';
    switch (item.dataset.action) {
      case 'rotate-ccw':
        counterLayer.rotateHex(ctxCounter.row, ctxCounter.col, -1);
        break;
      case 'rotate-cw':
        counterLayer.rotateHex(ctxCounter.row, ctxCounter.col, 1);
        break;
      case 'select-stack':
        counterLayer.setSelection(ctxStack.map(c => c.id));
        break;
      case 'deselect':
        counterLayer.clearSelection();
        break;
      case 'delete-counter':
        counterLayer.removeCounter(ctxCounter.id);
        break;
      case 'delete-stack':
        ctxStack.forEach(c => counterLayer.removeCounter(c.id));
        break;
    }
  });

  // Dismiss context menu on any click outside it
  document.addEventListener('click', e => {
    if (!ctxMenu.contains(e.target)) ctxMenu.style.display = 'none';
  }, true);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') ctxMenu.style.display = 'none';
  });

  function applyColors() {
    map.background = document.getElementById('col-bg').value;
    map.getLayer('hex-outline').strokeStyle = document.getElementById('col-border').value;
    map.getLayer('hex-label').fillStyle     = document.getElementById('col-number').value;
    map.getLayer('center-dot').fillStyle    = document.getElementById('col-dot').value;
    map.refresh();
  }

  function buildMap() {
    const canvas       = document.getElementById('map-canvas');
    const orientation  = document.getElementById('sel-orient').value === 'flat' ? FLAT_TOP : POINTY_TOP;
    const originCorner = document.getElementById('sel-origin').value;
    const offsetParity = document.getElementById('sel-parity').value === 'even' ? OFFSET_EVEN : OFFSET_ODD;
    const rotationStep = parseInt(document.getElementById('sel-rotstep').value, 10);

    const savedViewport = map ? map.getViewport() : null;
    if (map) map.destroy();

    map = new HexMap(canvas, {
      rows: ROWS, cols: COLS, hexSize: 40,
      orientation, originCorner, offsetParity, rotationStep,
    });

    // Layer order bottom-to-top: tile, fill, color, hex-outline, hex-label,
    // center-dot, anchor, counters, infoPanel, selPanel
    map.addLayer(tileLayer,   0);
    map.addLayer(fillLayer,   1);
    map.addLayer(colorLayer,  2);
    map.addLayer(anchorLayer, 3);   // above hex outlines so it sits on top of the grid
    map.addLayer(counterLayer);
    map.addLayer(infoPanel);
    map.addLayer(selPanel);

    // Restore checkbox visibility
    map.setLayerVisible('bg-tile',     document.getElementById('chk-img-tile').checked);
    map.setLayerVisible('map-fill',    document.getElementById('chk-img-fill').checked);
    map.setLayerVisible('anchor-icon', document.getElementById('chk-img-anchor').checked);
    map.setLayerVisible('hex-outline', document.getElementById('chk-outline').checked);
    map.setLayerVisible('hex-label',   document.getElementById('chk-label').checked);
    map.setLayerVisible('center-dot',  document.getElementById('chk-dot').checked);
    map.setLayerVisible('color',       document.getElementById('chk-color').checked);
    map.setLayerVisible('counters',    document.getElementById('chk-counters').checked);

    // Apply current colour picker values
    applyColors();

    if (savedViewport) map.setViewport(savedViewport);

    map.on('hexHover', ({ row, col }) => {
      document.getElementById('status').textContent =
        `row ${String(row).padStart(2,'0')}  col ${String(col).padStart(2,'0')}  →  ${map.getHexLabel(row, col)}`;
      infoPanel.html =
        `<span style="color:#6ab0d8;font-weight:bold">${map.getHexLabel(row, col)}</span><br>` +
        `row&nbsp;${String(row).padStart(2,'0')}&nbsp;&nbsp;col&nbsp;${String(col).padStart(2,'0')}`;
    });

    map.on('hexClick', ({ row, col }) => {
      console.log(`hex clicked  row=${row}  col=${col}  label=${map.getHexLabel(row, col)}`);
    });

    map.on('viewportChange', ({ angle }) => {
      document.getElementById('rot-val').textContent =
        `${Math.round((((angle * 180 / Math.PI) % 360) + 360) % 360)}°`;
    });

    document.getElementById('rot-val').textContent = `${map.getRotation()}°`;
  }

  // -- Image layer controls -----------------------------------------------------
  document.getElementById('chk-img-tile').addEventListener('change',   e => map.setLayerVisible('bg-tile',     e.target.checked));
  document.getElementById('chk-img-fill').addEventListener('change',   e => map.setLayerVisible('map-fill',    e.target.checked));
  document.getElementById('chk-img-anchor').addEventListener('change', e => map.setLayerVisible('anchor-icon', e.target.checked));
  document.getElementById('sld-img-alpha').addEventListener('input', e => {
    const v = parseFloat(e.target.value);
    tileLayer.alpha   = v;
    fillLayer.alpha   = v;
    anchorLayer.alpha = v;
    document.getElementById('val-img-alpha').textContent = v.toFixed(2);
    map.refresh();
  });

  // -- Layer checkboxes ---------------------------------------------------------
  document.getElementById('chk-outline').addEventListener('change', e => map.setLayerVisible('hex-outline', e.target.checked));
  document.getElementById('chk-label').addEventListener('change',   e => map.setLayerVisible('hex-label',   e.target.checked));
  document.getElementById('chk-dot').addEventListener('change',     e => map.setLayerVisible('center-dot',  e.target.checked));
  document.getElementById('chk-color').addEventListener('change',    e => map.setLayerVisible('color',    e.target.checked));
  document.getElementById('chk-counters').addEventListener('change', e => map.setLayerVisible('counters', e.target.checked));

  // -- Counter size sliders -----------------------------------------------------
  document.getElementById('sld-large').addEventListener('input', e => {
    counterLayer.largeScale = parseFloat(e.target.value);
    document.getElementById('val-large').textContent = parseFloat(e.target.value).toFixed(2);
    map.refresh();
  });
  document.getElementById('sld-small').addEventListener('input', e => {
    counterLayer.smallScale = parseFloat(e.target.value);
    document.getElementById('val-small').textContent = parseFloat(e.target.value).toFixed(2);
    map.refresh();
  });

  // -- Colour pickers -----------------------------------------------------------
  document.getElementById('col-bg').addEventListener('input',     () => applyColors());
  document.getElementById('col-border').addEventListener('input', () => applyColors());
  document.getElementById('col-number').addEventListener('input', () => applyColors());
  document.getElementById('col-dot').addEventListener('input',    () => applyColors());

  // -- Grid selects -------------------------------------------------------------
  document.getElementById('sel-orient').addEventListener('change', buildMap);
  document.getElementById('sel-origin').addEventListener('change', buildMap);
  document.getElementById('sel-parity').addEventListener('change', buildMap);

  // -- Rotation -----------------------------------------------------------------
  document.getElementById('btn-cw').addEventListener('click', () => {
    map.rotateBy(1);
    document.getElementById('rot-val').textContent = `${map.getRotation()}°`;
  });
  document.getElementById('btn-ccw').addEventListener('click', () => {
    map.rotateBy(-1);
    document.getElementById('rot-val').textContent = `${map.getRotation()}°`;
  });
  document.getElementById('sel-rotstep').addEventListener('change', e => {
    map.rotationStep = parseInt(e.target.value, 10);
  });

  // -- Fit -----------------------------------------------------------------------
  document.getElementById('btn-fit').addEventListener('click', () => {
    map.fitToView();
    document.getElementById('rot-val').textContent = `${map.getRotation()}°`;
  });

  buildMap();
})();
</script>
</body>
</html>
