<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HexDetailsLayer Demo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #111a24;
  font-family: monospace;
  color: #c8d8e8;
}

#app { display: flex; flex-direction: column; width: 100%; height: 100%; }

#toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 14px;
  background: #162030;
  border-bottom: 1px solid #253545;
  flex-shrink: 0;
  flex-wrap: wrap;
  font-size: 13px;
}

.title { color: #6ab0d8; font-weight: bold; letter-spacing: .05em; white-space: nowrap; }

.sep { width: 1px; height: 18px; background: #2d4050; flex-shrink: 0; }

.group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

label { display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; white-space: nowrap; }

button {
  background: #0e1c28;
  color: #c8d8e8;
  border: 1px solid #2d4050;
  padding: 3px 10px;
  border-radius: 3px;
  cursor: pointer;
  font-family: monospace;
  font-size: 13px;
  white-space: nowrap;
}
button:hover { background: #1a2d40; border-color: #4a6a88; }

select, input[type=number] {
  background: #0e1c28;
  color: #c8d8e8;
  border: 1px solid #2d4050;
  padding: 2px 5px;
  border-radius: 3px;
  cursor: pointer;
  font-family: monospace;
  font-size: 13px;
}
select:hover, input[type=number]:hover { border-color: #4a6a88; }

input[type=range] {
  width: 80px;
  cursor: pointer;
  vertical-align: middle;
  accent-color: #4a8ab8;
}

.scale-val {
  min-width: 2.5em;
  display: inline-block;
  color: #6ab0d8;
  font-size: 12px;
}

#rot-val {
  min-width: 3.8em;
  text-align: center;
  color: #6ab0d8;
  font-size: 13px;
}

#status {
  margin-left: auto;
  color: #4a6a88;
  font-size: 12px;
  white-space: nowrap;
}

#canvas-wrap { flex: 1; overflow: hidden; position: relative; }

#map-canvas {
  width: 100%;
  height: 100%;
  display: block;
  cursor: grab;
  touch-action: none;
}
#map-canvas:active { cursor: grabbing; }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="title">HexDetailsLayer</span>

    <div class="sep"></div>

    <div class="group">
      <button id="btn-regen">&#x21BA; New Map</button>
    </div>

    <div class="sep"></div>

    <div class="group">
      <label><input type="checkbox" id="chk-terrain" checked> Terrain</label>
      <label><input type="checkbox" id="chk-edges"   checked> Edges</label>
      <label><input type="checkbox" id="chk-outline" checked> Outlines</label>
      <label><input type="checkbox" id="chk-labels">          Labels</label>
    </div>

    <div class="sep"></div>

    <div class="group">
      <label>Min&nbsp;px
        <input type="range" id="sld-min" min="0" max="40" step="1" value="4">
        <span class="scale-val" id="val-min">4</span>
      </label>
    </div>

    <div class="sep"></div>

    <div class="group">
      <button id="btn-ccw">&#x21BA; CCW</button>
      <span id="rot-val">0°</span>
      <button id="btn-cw">&#x21BB; CW</button>
    </div>

    <div class="sep"></div>

    <div class="group">
      <span class="title" style="font-size:11px">Path</span>
      <select id="pf-mode">
        <option value="shortest">Shortest</option>
        <option value="reachable">Reachable</option>
        <option value="path-cost">Path cost</option>
      </select>
      <select id="pf-unit">
        <option value="infantry">Infantry</option>
        <option value="armor">Armor</option>
        <option value="ship">Ship</option>
      </select>
      <label id="pf-budget-wrap" style="display:none;align-items:center;gap:4px">budget&nbsp;<input type="number" id="pf-budget" value="6" min="0.5" max="50" step="0.5" style="width:44px;text-align:right"></label>
      <button id="pf-clear">Clear</button>
      <span id="pf-hint" style="color:#6ab0d8;font-size:11px;white-space:nowrap;min-width:14em">click start hex</span>
    </div>

    <div class="sep"></div>

    <button id="btn-fit">Fit</button>

    <span id="status">hover a hex</span>
  </div>

  <div id="canvas-wrap">
    <canvas id="map-canvas"></canvas>
  </div>
</div>

<script src="src/hexviewer.js"></script>
<script src="src/hex-movement.js"></script>
<script>
(function () {
'use strict';

const { HexMap, HexDetailsLayer, PanelLayer, MinimapLayer,
        findPath, reachableHexes, pathCost,
        Geometry, POINTY_TOP, OFFSET_ODD } = window.HexViewer;

const ROWS = 40, COLS = 60;

// ── Terrain types ─────────────────────────────────────────────────────────────

const TERRAIN = {
    plain:    { fill: '#b4c870', dark: '#88a040', name: 'Plain'    },
    forest:   { fill: '#2c5e26', dark: '#1a3814', name: 'Forest'   },
    mountain: { fill: '#7a7062', dark: '#524c42', name: 'Mountain' },
    water:    { fill: '#3a7aaa', dark: '#285e88', name: 'Water'    },
    desert:   { fill: '#d4b464', dark: '#aa8c3c', name: 'Desert'   },
    swamp:    { fill: '#4e6230', dark: '#34401e', name: 'Swamp'    },
};

// ── Edge types ────────────────────────────────────────────────────────────────

const EDGE = {
    river: { color: '#44aaee', width: 3.5, dash: [],     name: 'River' },
    road:  { color: '#c09050', width: 2.5, dash: [],     name: 'Road'  },
    wall:  { color: '#667088', width: 5.0, dash: [],     name: 'Wall'  },
    cliff: { color: '#cc6644', width: 3.0, dash: [],     name: 'Cliff' },
};

// ── Unit types & movement costs ───────────────────────────────────────────────

const UNIT_TYPES = {
    infantry: { name: 'infantry', wheeled: false, naval: false, label: 'Infantry' },
    armor:    { name: 'armor',    wheeled: true,  naval: false, label: 'Armor'    },
    ship:     { name: 'ship',     wheeled: false, naval: true,  label: 'Ship'     },
};

// Base terrain cost: [infantry, wheeled/armor]; Infinity = impassable
const TERRAIN_MOVE = {
    plain:    [1,        1       ],
    forest:   [2,        3       ],
    mountain: [3,        Infinity],
    water:    [Infinity, Infinity],
    desert:   [2,        2       ],
    swamp:    [3,        Infinity],
};

// costFn closed over edgesLayer (hex props come from terrainLayer via pathfinder;
// edge props are queried directly from edgesLayer since they live in a separate layer).
function costFn(fromR, fromC, toR, toC, edge, hexProps, _edgeProps, unitType) {
    const terrain = hexProps?.terrain ?? 'plain';

    if (unitType.naval) return terrain === 'water' ? 1 : Infinity;
    if (terrain === 'water') return Infinity;

    // Query edge before the Infinity check so roads can override impassable terrain.
    const ep = edgesLayer ? edgesLayer.getEdge(fromR, fromC, edge) : null;
    if (ep?.type === 'cliff' || ep?.type === 'wall') return Infinity;

    const costs = TERRAIN_MOVE[terrain];
    let cost = costs ? (unitType.wheeled ? costs[1] : costs[0]) : 1;

    // A road makes the hex passable even for units that can't otherwise enter;
    // use the infantry base cost as the starting point before road reduction.
    if (!isFinite(cost) && ep?.type === 'road') cost = costs ? costs[0] : 3;
    if (!isFinite(cost)) return Infinity;

    if (ep?.type === 'river') cost += unitType.wheeled ? 2 : 1;
    if (ep?.type === 'road')  cost  = Math.max(0.5, cost * 0.5);

    return cost;
}

// ── PathResultLayer ───────────────────────────────────────────────────────────

class PathResultLayer extends HexViewer.Layer {
    constructor() {
        super('path-result');
        this._result = null;
        this._pins   = [];
    }

    setPath(steps, cost)              { this._result = { type: 'path',      steps, cost };         this._refresh(); }
    setReachable(rmap, budget)        { this._result = { type: 'reachable', rmap, budget };         this._refresh(); }
    setCostPath(steps, cost, blocked) { this._result = { type: 'cost',      steps, cost, blocked }; this._refresh(); }
    setPins(pins)                     { this._pins   = pins;                                        this._refresh(); }
    clear()                           { this._result = null; this._pins = [];                       this._refresh(); }
    _refresh()                        { if (this._hexMap) this._hexMap._scheduleRender(); }

    render(ctx, hexMap, visibleHexes) {
        if (!this._result && !this._pins.length) return;
        const co         = hexMap.cornerOffsets;
        const zoom       = hexMap._viewport.zoom;
        const s          = hexMap._layout.size;

        const visMap = new Map(visibleHexes.map(h => [`${h.row},${h.col}`, h]));

        function outlineHex(hex) {
            ctx.beginPath();
            ctx.moveTo(hex.cx + co[0].dx, hex.cy + co[0].dy);
            for (let i = 1; i < 6; i++) ctx.lineTo(hex.cx + co[i].dx, hex.cy + co[i].dy);
            ctx.closePath();
        }

        // ── Fill pass ────────────────────────────────────────────────────────
        if (this._result?.type === 'path' || this._result?.type === 'cost') {
            const { steps, blocked } = this._result;
            const fill = this._result.type === 'path' ? 'rgba(60,210,100,0.42)' :
                         blocked ? 'rgba(210,60,60,0.42)' : 'rgba(60,140,220,0.42)';
            const pathSet = new Set(steps.map(h => `${h.row},${h.col}`));
            ctx.fillStyle = fill;
            for (const hex of visibleHexes) {
                if (pathSet.has(`${hex.row},${hex.col}`)) { outlineHex(hex); ctx.fill(); }
            }
        } else if (this._result?.type === 'reachable') {
            const { rmap, budget } = this._result;
            for (const hex of visibleHexes) {
                const entry = rmap.get(`${hex.row},${hex.col}`);
                if (!entry) continue;
                const t = budget > 0 ? entry.cost / budget : 0;
                ctx.fillStyle = `rgba(${40 + (200 * t)|0},${210 - (160 * t)|0},60,0.48)`;
                outlineHex(hex); ctx.fill();
            }
        }

        // ── Cost / step labels (only when hexes are large enough to read) ────
        if (s * zoom >= 20 && this._result) {
            ctx.save();
            ctx.textAlign    = 'center';
            ctx.textBaseline = 'middle';
            ctx.font         = `bold ${s * 0.28}px monospace`;
            ctx.fillStyle    = 'rgba(255,255,255,0.90)';

            if (this._result.type === 'reachable') {
                for (const [k, entry] of this._result.rmap) {
                    const hex = visMap.get(k);
                    if (!hex) continue;
                    ctx.fillText(Number.isInteger(entry.cost) ? `${entry.cost}` : entry.cost.toFixed(1),
                                 hex.cx, hex.cy);
                }
            } else if (this._result.type === 'path') {
                this._result.steps.forEach((step, idx) => {
                    const hex = visMap.get(`${step.row},${step.col}`);
                    if (hex) ctx.fillText(idx, hex.cx, hex.cy);
                });
            }
            ctx.restore();
        }

        // ── Pin borders ──────────────────────────────────────────────────────
        if (this._pins.length) {
            const pinMap = new Map(this._pins.map(p => [`${p.row},${p.col}`, p.role]));
            ctx.lineWidth = Math.max(2.5, 2.5 / zoom);
            for (const hex of visibleHexes) {
                const role = pinMap.get(`${hex.row},${hex.col}`);
                if (!role) continue;
                ctx.strokeStyle = role === 'start' ? '#44ff88' :
                                  role === 'end'   ? '#ff4444' : '#4499ff';
                outlineHex(hex); ctx.stroke();
            }
        }
    }
}

// ── drawHexFn ─────────────────────────────────────────────────────────────────

function drawHexFn(ctx, hex, props, hexMap) {
    const terrain = props?.terrain ?? 'plain';
    const def     = TERRAIN[terrain] ?? TERRAIN.plain;
    const co      = hexMap.cornerOffsets;
    const s       = hexMap._layout.size;
    const { cx, cy } = hex;

    // Terrain fill
    ctx.beginPath();
    ctx.moveTo(cx + co[0].dx, cy + co[0].dy);
    for (let i = 1; i < 6; i++) ctx.lineTo(cx + co[i].dx, cy + co[i].dy);
    ctx.closePath();
    ctx.fillStyle = def.fill;
    ctx.fill();

    // Per-terrain decoration clipped to the hex polygon
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx + co[0].dx, cy + co[0].dy);
    for (let i = 1; i < 6; i++) ctx.lineTo(cx + co[i].dx, cy + co[i].dy);
    ctx.closePath();
    ctx.clip();

    switch (terrain) {

        case 'forest': {
            ctx.fillStyle = def.dark;
            for (const [tx, ty] of [[-s*0.22, -s*0.10], [s*0.22, -s*0.10], [0, s*0.20]]) {
                const r = s * 0.19;
                ctx.beginPath();
                ctx.moveTo(cx + tx,     cy + ty - r);
                ctx.lineTo(cx + tx - r, cy + ty + r * 0.65);
                ctx.lineTo(cx + tx + r, cy + ty + r * 0.65);
                ctx.closePath();
                ctx.fill();
            }
            break;
        }

        case 'mountain': {
            ctx.fillStyle = def.dark;
            ctx.beginPath();
            ctx.moveTo(cx,         cy - s * 0.52);
            ctx.lineTo(cx - s*0.5, cy + s * 0.28);
            ctx.lineTo(cx + s*0.5, cy + s * 0.28);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#ddeef8';
            ctx.beginPath();
            ctx.moveTo(cx,          cy - s * 0.52);
            ctx.lineTo(cx - s*0.18, cy - s * 0.22);
            ctx.lineTo(cx + s*0.18, cy - s * 0.22);
            ctx.closePath();
            ctx.fill();
            break;
        }

        case 'water': {
            ctx.strokeStyle = 'rgba(255,255,255,0.28)';
            ctx.lineWidth   = s * 0.06;
            ctx.lineCap     = 'round';
            for (let w = -1; w <= 1; w += 2) {
                ctx.beginPath();
                ctx.arc(cx + w * s * 0.20, cy, s * 0.15, Math.PI, 0, false);
                ctx.stroke();
            }
            break;
        }

        case 'desert': {
            ctx.fillStyle = def.dark;
            for (let i = 0; i < 7; i++) {
                const a = i * Math.PI * 2 / 7;
                ctx.beginPath();
                ctx.arc(cx + Math.cos(a)*s*0.28, cy + Math.sin(a)*s*0.28, s*0.048, 0, Math.PI*2);
                ctx.fill();
            }
            break;
        }

        case 'swamp': {
            ctx.fillStyle = def.dark;
            for (const [tx, ty] of [[0, -s*0.20], [-s*0.22, s*0.10], [s*0.22, s*0.10]]) {
                ctx.beginPath();
                ctx.ellipse(cx + tx, cy + ty, s*0.13, s*0.07, 0.5, 0, Math.PI*2);
                ctx.fill();
            }
            break;
        }
    }

    ctx.restore();
}

// ── drawEdgeFn ────────────────────────────────────────────────────────────────
// Roads draw center-to-midpoint from both adjacent hexes (creating a visual
// road line that passes through the hex centers). All other edge types draw
// a full corner-to-corner line along the shared hex boundary.

function drawEdgeFn(ctx, geom, props, hexMap) {
    const def = EDGE[props?.type];
    if (!def) return;

    const zoom = hexMap._viewport.zoom;

    ctx.save();
    ctx.strokeStyle = def.color;
    // World-space width: scales proportionally with zoom. Floor at 0.5 screen pixels
    // so lines stay visible when zoomed far out or on the minimap.
    ctx.lineWidth   = Math.max(def.width, 0.5 / zoom);
    ctx.lineCap     = 'round';

    if (props.type === 'road') {
        // Draw from canonical hex centre to edge midpoint, and neighbour centre to midpoint.
        // Together these form a continuous road line through both hex centres.
        ctx.beginPath();
        ctx.moveTo(geom.cx, geom.cy);
        ctx.lineTo(geom.mx, geom.my);
        if (geom.nbrRow >= 0) {
            const nbr = Geometry.offsetToPixel(geom.nbrRow, geom.nbrCol, hexMap._layout);
            ctx.moveTo(nbr.x, nbr.y);
            ctx.lineTo(geom.mx, geom.my);
        }
        ctx.stroke();
    } else {
        // Corner-to-corner line along the edge boundary
        ctx.beginPath();
        ctx.moveTo(geom.x0, geom.y0);
        ctx.lineTo(geom.x1, geom.y1);
        ctx.stroke();
    }

    ctx.restore();
}

// ── Random map generation ─────────────────────────────────────────────────────

function buildTerrainGrid(hexMap) {
    const { orientation, parity } = hexMap._layout;
    const grid = Array.from({ length: ROWS }, () => new Array(COLS).fill('plain'));

    function inBounds(r, c) { return r >= 0 && r < ROWS && c >= 0 && c < COLS; }

    function nbrs(r, c) {
        return Geometry.offsetNeighbors(r, c, orientation, parity).filter(n => inBounds(n.row, n.col));
    }

    function growBlob(terrain, numSeeds, maxSize, spreadProb) {
        const frontier = [];
        for (let i = 0; i < numSeeds; i++) {
            const r = (Math.random() * ROWS) | 0;
            const c = (Math.random() * COLS) | 0;
            if (grid[r][c] === 'plain') { grid[r][c] = terrain; frontier.push({ row: r, col: c }); }
        }
        let fi = 0, count = frontier.length;
        while (fi < frontier.length && count < maxSize) {
            for (const n of nbrs(frontier[fi].row, frontier[fi].col)) {
                if (grid[n.row][n.col] === 'plain' && Math.random() < spreadProb) {
                    grid[n.row][n.col] = terrain;
                    frontier.push(n);
                    if (++count >= maxSize) break;
                }
            }
            fi++;
        }
    }

    const T = ROWS * COLS;
    growBlob('water',    3, (T * 0.17) | 0, 0.68);
    growBlob('forest',   4, (T * 0.20) | 0, 0.58);
    growBlob('mountain', 3, (T * 0.10) | 0, 0.52);
    growBlob('desert',   2, (T * 0.08) | 0, 0.62);
    growBlob('swamp',    2, (T * 0.05) | 0, 0.48);

    return grid;
}

// Contiguous random walk placing edge features.
// Returns the final (row, col) so callers can chain walks if needed.
function randomWalk(layer, grid, hexMap, startR, startC, type, minLen, maxLen, avoidWater) {
    const { orientation, parity } = hexMap._layout;
    const length   = minLen + (Math.random() * (maxLen - minLen + 1)) | 0;
    let r = startR, c = startC, lastEdge = -1;

    for (let step = 0; step < length; step++) {
        const allNbrs = Geometry.offsetNeighbors(r, c, orientation, parity);
        const valid   = [];
        for (let e = 0; e < 6; e++) {
            if (lastEdge >= 0 && e === (lastEdge + 3) % 6) continue; // no U-turn
            const n = allNbrs[e];
            if (n.row < 0 || n.row >= ROWS || n.col < 0 || n.col >= COLS) continue;
            if (avoidWater && grid[n.row][n.col] === 'water') continue;
            valid.push({ e, row: n.row, col: n.col });
        }
        if (valid.length === 0) break;

        const pick = valid[(Math.random() * valid.length) | 0];
        layer.setEdge(r, c, pick.e, { type });
        lastEdge = pick.e;
        r = pick.row;
        c = pick.col;
    }
}

function randomNonWaterHex(grid) {
    let r, c, attempts = 0;
    do {
        r = (Math.random() * ROWS) | 0;
        c = (Math.random() * COLS) | 0;
    } while (grid[r][c] === 'water' && ++attempts < 40);
    return grid[r][c] === 'water' ? null : { r, c };
}

function placeEdges(layer, grid, hexMap) {
    const { orientation, parity } = hexMap._layout;
    const lowland = new Set(['plain', 'forest', 'desert', 'swamp']);

    // Cliffs and walls: terrain-adjacency based (processed once per physical edge)
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const allNbrs = Geometry.offsetNeighbors(r, c, orientation, parity);
            for (let e = 0; e < 6; e++) {
                const n = allNbrs[e];
                if (n.row < 0 || n.row >= ROWS || n.col < 0 || n.col >= COLS) continue;
                if (n.row < r || (n.row === r && n.col <= c)) continue; // each edge once

                const tA = grid[r][c], tB = grid[n.row][n.col];

                if ((tA === 'mountain' && lowland.has(tB)) || (tB === 'mountain' && lowland.has(tA))) {
                    if (Math.random() < 0.38) { layer.setEdge(r, c, e, { type: 'cliff' }); continue; }
                }
                if (tA === 'mountain' && tB === 'mountain') {
                    if (Math.random() < 0.18) layer.setEdge(r, c, e, { type: 'wall' });
                }
            }
        }
    }

    // Rivers: contiguous walks through non-water terrain (inland rivers/streams)
    for (let i = 0; i < 6; i++) {
        const start = randomNonWaterHex(grid);
        if (start) randomWalk(layer, grid, hexMap, start.r, start.c, 'river', 5, 14, true);
    }

    // Roads: contiguous walks through non-water terrain
    for (let i = 0; i < 8; i++) {
        const start = randomNonWaterHex(grid);
        if (start) randomWalk(layer, grid, hexMap, start.r, start.c, 'road', 4, 11, true);
    }
}

// ── Panels ────────────────────────────────────────────────────────────────────

function makeLegendPanel() {
    const panel = new PanelLayer('legend', { position: { bottom: 10, left: 10 } });

    let html = '<div style="color:#6ab0d8;font-weight:bold;margin-bottom:5px;font-size:11px;letter-spacing:.06em">TERRAIN</div>';
    for (const def of Object.values(TERRAIN)) {
        html +=
            `<div style="display:flex;align-items:center;gap:7px;margin-bottom:3px;font-size:12px">` +
            `<span style="width:13px;height:13px;background:${def.fill};flex-shrink:0;` +
            `border:1px solid rgba(255,255,255,0.15);display:inline-block"></span>` +
            def.name + `</div>`;
    }

    html += '<div style="color:#6ab0d8;font-weight:bold;margin:8px 0 5px;font-size:11px;letter-spacing:.06em">EDGES</div>';
    for (const def of Object.values(EDGE)) {
        html +=
            `<div style="display:flex;align-items:center;gap:7px;margin-bottom:3px;font-size:12px">` +
            `<span style="width:13px;height:0;border-top:3px solid ${def.color};` +
            `flex-shrink:0;display:inline-block"></span>` +
            def.name + `</div>`;
    }

    panel.html = html;
    panel.setSize({ width: 108 });
    return panel;
}

// ── Map build ─────────────────────────────────────────────────────────────────

let map, terrainLayer, edgesLayer, infoPanel, minimap, resultLayer;
let pfClicks = [];

function buildMap() {
    const canvas  = document.getElementById('map-canvas');
    const minSize = parseInt(document.getElementById('sld-min').value, 10);

    if (map) map.destroy();

    terrainLayer = new HexDetailsLayer('terrain', {
        mode: 'complete', rows: ROWS, cols: COLS,
        drawHexFn,
        drawUnset:     true,
        minScreenSize: minSize,
    });

    edgesLayer = new HexDetailsLayer('edges', {
        drawEdgeFn,
        minScreenSize: minSize,
    });

    infoPanel = new PanelLayer('info', { position: { top: 10, right: 10 } });
    infoPanel.setSize({ width: 148 });
    infoPanel.html = '<span style="color:#4a6a88;font-size:12px">hover a hex</span>';

    minimap = new MinimapLayer({ width: 280, height: 200, corner: 'bottom-right' });

    map = new HexMap(canvas, {
        rows: ROWS, cols: COLS, hexSize: 40,
        orientation: POINTY_TOP, offsetParity: OFFSET_ODD,
        background: '#0a1420',
    });

    resultLayer = new PathResultLayer();

    map.addLayer(terrainLayer, 0);  // below built-in outline/label layers
    map.addLayer(edgesLayer);       // above outlines
    map.addLayer(resultLayer);      // path highlights above terrain/edges
    map.addLayer(makeLegendPanel());
    map.addLayer(infoPanel);
    map.addLayer(minimap);

    map.setLayerVisible('terrain',     document.getElementById('chk-terrain').checked);
    map.setLayerVisible('edges',       document.getElementById('chk-edges').checked);
    map.setLayerVisible('hex-outline', document.getElementById('chk-outline').checked);
    map.setLayerVisible('hex-label',   document.getElementById('chk-labels').checked);
    map.setLayerVisible('center-dot',  false);

    const grid = buildTerrainGrid(map);
    for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
            terrainLayer.setHex(r, c, { terrain: grid[r][c] });
    placeEdges(edgesLayer, grid, map);
    minimap.redraw(map, [terrainLayer, edgesLayer]);
    pfClicks = [];

    map.on('hexClick', ({ row, col, button }) => {
        if (button !== 0) return;
        const mode = document.getElementById('pf-mode').value;
        const unit = UNIT_TYPES[document.getElementById('pf-unit').value];

        if (mode === 'shortest') {
            pfClicks.push({ row, col });
            if (pfClicks.length === 1) {
                resultLayer.clear();
                resultLayer.setPins([{ row, col, role: 'start' }]);
                pfHint('click end hex');
            } else {
                const [start, end] = pfClicks;
                const res = findPath(terrainLayer, start.row, start.col, end.row, end.col, costFn, unit);
                resultLayer.setPins([{ ...start, role: 'start' }, { ...end, role: 'end' }]);
                if (res) {
                    resultLayer.setPath(res.path, res.cost);
                    pfHint(`${res.path.length} hexes · cost ${fmtCost(res.cost)}`);
                } else {
                    resultLayer.setCostPath([], 0, true);
                    pfHint('no path found');
                }
                pfClicks = [];
            }
        } else if (mode === 'reachable') {
            pfClicks = [{ row, col }];
            const budget = parseFloat(document.getElementById('pf-budget').value) || 6;
            const res    = reachableHexes(terrainLayer, row, col, budget, costFn, unit);
            resultLayer.setReachable(res, budget);
            resultLayer.setPins([{ row, col, role: 'start' }]);
            pfHint(`${res.size} hexes within ${budget} MP`);
        } else { // path-cost
            // Skip consecutive duplicate clicks
            const last = pfClicks[pfClicks.length - 1];
            if (last && last.row === row && last.col === col) return;
            pfClicks.push({ row, col });
            const pins = pfClicks.map((h, i) => ({ ...h, role: i === 0 ? 'start' : 'wp' }));
            resultLayer.setPins(pins);
            if (pfClicks.length >= 2) {
                const res = pathCost(terrainLayer, pfClicks, costFn, unit);
                resultLayer.setCostPath(pfClicks, res.cost, res.blocked);
                pfHint(res.blocked
                    ? `blocked after ${pfClicks.length} hexes`
                    : `${pfClicks.length} hexes · cost ${fmtCost(res.cost)}`);
            } else {
                resultLayer.clear();
                resultLayer.setPins(pins);
                pfHint('click to extend path');
            }
        }
    });

    map.on('hexHover', ({ row, col }) => {
        const hProps    = terrainLayer.getHex(row, col);
        const tDef      = TERRAIN[hProps?.terrain] ?? TERRAIN.plain;
        const edgeParts = [];
        for (let e = 0; e < 6; e++) {
            const ep = edgesLayer.getEdge(row, col, e);
            if (ep?.type) edgeParts.push(`e${e}:${EDGE[ep.type]?.name ?? ep.type}`);
        }
        document.getElementById('status').textContent =
            `(${String(row).padStart(2,'0')},${String(col).padStart(2,'0')})  ${tDef.name}` +
            (edgeParts.length ? `  [${edgeParts.join('  ')}]` : '');
        infoPanel.html =
            `<div style="color:#6ab0d8;font-weight:bold;margin-bottom:5px">` +
            `(${String(row).padStart(2,'0')},${String(col).padStart(2,'0')})</div>` +
            `<div style="display:flex;align-items:center;gap:6px;margin-bottom:${edgeParts.length?6:0}px">` +
            `<span style="width:12px;height:12px;background:${tDef.fill};display:inline-block;` +
            `border:1px solid rgba(255,255,255,0.15)"></span>` +
            `<span>${tDef.name}</span></div>` +
            (edgeParts.length
                ? `<div style="color:#88aabb;font-size:11px;margin-top:2px">` +
                  edgeParts.map(ep => `· ${ep}`).join('<br>') + `</div>`
                : '');
    });

    map.on('viewportChange', () => {
        document.getElementById('rot-val').textContent = `${map.getRotation()}°`;
    });

    document.getElementById('rot-val').textContent = `${map.getRotation()}°`;
    map.fitToView();
}

// ── Controls ──────────────────────────────────────────────────────────────────

document.getElementById('btn-regen').addEventListener('click', buildMap);
document.getElementById('btn-fit').addEventListener('click',   () => map && map.fitToView());

document.getElementById('btn-ccw').addEventListener('click', () => {
    map.rotateBy(-1);
    document.getElementById('rot-val').textContent = `${map.getRotation()}°`;
});
document.getElementById('btn-cw').addEventListener('click', () => {
    map.rotateBy(1);
    document.getElementById('rot-val').textContent = `${map.getRotation()}°`;
});

document.getElementById('chk-terrain').addEventListener('change', e => map.setLayerVisible('terrain',     e.target.checked));
document.getElementById('chk-edges'  ).addEventListener('change', e => map.setLayerVisible('edges',       e.target.checked));
document.getElementById('chk-outline').addEventListener('change', e => map.setLayerVisible('hex-outline', e.target.checked));
document.getElementById('chk-labels' ).addEventListener('change', e => map.setLayerVisible('hex-label',   e.target.checked));

document.getElementById('sld-min').addEventListener('input', e => {
    const v = parseInt(e.target.value, 10);
    document.getElementById('val-min').textContent = v;
    if (terrainLayer) terrainLayer.minScreenSize = v;
    if (edgesLayer)   edgesLayer.minScreenSize   = v;
    if (map) map.refresh();
});

// ── Pathfinding helpers ────────────────────────────────────────────────────────

function pfHint(text) { document.getElementById('pf-hint').textContent = text; }
function fmtCost(c)   { return Number.isInteger(c) ? `${c}` : c.toFixed(1); }

function pfReset() {
    if (resultLayer) resultLayer.clear();
    pfClicks = [];
    pfHint('click start hex');
}

document.getElementById('pf-mode').addEventListener('change', () => {
    const mode = document.getElementById('pf-mode').value;
    document.getElementById('pf-budget-wrap').style.display = mode === 'reachable' ? 'flex' : 'none';
    pfReset();
});

document.getElementById('pf-unit').addEventListener('change', pfReset);
document.getElementById('pf-clear').addEventListener('click',  pfReset);

buildMap();

})();
</script>
</body>
</html>
